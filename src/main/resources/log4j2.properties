# log4j2 설정 — 로컬 MiniCluster 파이프라인 관측용.
#
# slf4j API(코드) → log4j2(이 설정)로 출력된다. 학습용이라:
#   - 우리 코드(com.example.flink)는 DEBUG로 두어 이벤트 단위 흐름까지 보이게,
#   - Flink 런타임은 INFO(워터마크/체크포인트/Job 라이프사이클 관측에 유용),
#   - 소란한 클라이언트(kafka/opensearch/http)는 WARN으로 눌러 파이프라인 흐름이 잘 보이게 한다.
# 이벤트가 너무 많아 시끄러우면 logger.app.level 을 INFO로 올리면 window 결과만 남는다.

status = warn
name = local-pipeline

# ── Appender: 콘솔(표준출력), 사람이 읽기 좋은 패턴 ──
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} %-5level [%t] %logger{1} - %msg%n

# ── Appender: 파일 (Flink Web UI의 TaskManager "Logs" 탭이 읽는 대상) ──
#   Flink REST 핸들러는 System.getProperty("log.file")이 가리키는 파일을 서빙한다.
#   미설정 시 "The file LOG is not available on the TaskExecutor" → exec:exec@job가
#   -Dlog.file=target/flink-logs/flink.log 를 넘긴다(pom). 아래 fileName도 그 값을 따른다
#   (미설정이면 :- 뒤 기본 경로). MiniCluster는 JM/TM이 한 JVM이라 로그 파일도 공유.
appender.rolling.type = RollingFile
appender.rolling.name = RollingFileAppender
appender.rolling.fileName = ${sys:log.file:-target/flink-logs/flink.log}
appender.rolling.filePattern = ${sys:log.file:-target/flink-logs/flink.log}.%i
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{HH:mm:ss.SSS} %-5level [%t] %logger{1} - %msg%n
appender.rolling.policies.type = Policies
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 50MB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 3

# ── Root (콘솔 + 파일 둘 다) ──
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.rolling.ref = RollingFileAppender

# ── 우리 파이프라인 코드: 이벤트 단위 흐름까지 ──
logger.app.name = com.example.flink
logger.app.level = DEBUG

# ── Flink 런타임: 라이프사이클/워터마크/체크포인트 로그 유지 ──
logger.flink.name = org.apache.flink
logger.flink.level = INFO

# ── 소란한 클라이언트 억제 ──
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN
logger.opensearch.name = org.opensearch
logger.opensearch.level = WARN
logger.httpclient.name = org.apache.http
logger.httpclient.level = WARN
# Confluent serializer가 startup 시 설정 전체를 INFO로 덤프 → 억제.
logger.confluent.name = io.confluent
logger.confluent.level = WARN
